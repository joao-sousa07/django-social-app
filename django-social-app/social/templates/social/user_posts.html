{% extends 'social/base.html' %}

{% block content %}

<h2 class="mb-4">
    👤 {{ user.username }}
</h2>

{% for post in posts %}
<div class="card mb-3 shadow-sm">
    <div class="card-body">
        <h5>{{ post.title }}</h5>
        <p>{{ post.content }}</p>
    </div>
</div>
{% endfor %}

{% endblock %}
